<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Hakkımda | Feyza Alagöz</title>
    <style>
        /* Tasarım kodlarını buraya ekliyoruz */
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; }
        header { text-align: center; padding: 50px 20px; background: #fff; }
        
        .hobi-konteynir {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 30px;
        }

        .hobi-kart {
            height: 300px;
            border-radius: 20px;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: none;
        }

        .hobi-kart:hover { transform: scale(1.05); }

        .hobi-detay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <nav>
        <!-- Buraya ana sayfaya dönüş linki ekleyelim -->
        <a href="index.html">Ana Sayfa</a>
    </nav>

    <main>
        <section id="hakkimda">
            <header>
                <h1>Hakkımda</h1>
                <p>Bolu'dan Sakarya Üniversitesi'ne uzanan yolculuğum ve hobilerim.</p>
            </header>

            <div class="hobi-konteynir">
                <!-- Hobilerin (Önceki mesajdaki article yapılarını buraya ekle) -->
                <article class="hobi-kart" style="background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('tatli.jpg');">
                    <div class="hobi-detay">
                        <h3>🍰 Yeni Tatlılar Denemek</h3>
                    </div>
                </article>
                
                <article class="hobi-kart" style="background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('puzzle.jpg');">
                    <div class="hobi-detay">
                        <h3>🧩 Puzzle Yapmak</h3>
                    </div>
                </article>

                <!-- Diğer hobilerini de aynı article yapısıyla buraya sırala -->
            </div>
        </section>
    </main>

</body>
</html>
